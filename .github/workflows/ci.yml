name: CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  check:
    name: Lint and check codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: make install-frozen
      - name: Lint and format
        run: make check
